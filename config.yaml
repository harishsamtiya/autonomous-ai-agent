# ============================================
# AI Agent Configuration
# ============================================

llm:
  model: "gpt-4"
  temperature: 0.1
  max_tokens: 2048
  top_p: 1.0

memory:
  persist_dir: "./memory_store"
  embedding_model: "text-embedding-3-small"
  max_history: 10
  similarity_top_k: 3

agent:
  max_iterations: 10
  early_stopping: "generate"
  verbose: true
  handle_parsing_errors: true
